version: "3.9"

services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_tracker_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - student-tracker-net

  backend:
    build:
      context: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/student_tracker_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - student-tracker-net

  ai-service:
    build:
      context: ./ai-engine
    ports:
      - "8000:8000"
    networks:
      - student-tracker-net

  frontend:
    build:
      context: ./frontend/student-tracker
    environment:
      REACT_APP_API_BASE: http://backend:8080
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - student-tracker-net

volumes:
  mysql_data:

networks:
  student-tracker-net:
    driver: bridge
